<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>우리집 가계부</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f6e6e">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- Excel export (loaded lazily; app works offline without it) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#1a1d29;--paper:#fbf9f4;--rule:#e3ddd0;
    --teal:#0f6e6e;--teal-soft:#e2f0ef;
    --coral:#c0463b;--coral-soft:#f7e4e1;
    --gold:#b8860b;--muted:#6b6456;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:calc(24px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(80px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left))}
  header.top{display:flex;align-items:baseline;justify-content:space-between;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:6px;flex-wrap:wrap;gap:8px}
  header.top h1{font-size:26px;font-weight:800;letter-spacing:-.02em}
  header.top h1 span{color:var(--teal)}
  .monthnav{display:flex;align-items:center;gap:10px}
  .monthnav button{border:1px solid var(--rule);background:#fff;width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer;color:var(--ink);transition:.15s}
  .monthnav button:hover{background:var(--ink);color:#fff}
  .monthnav .label{font-size:17px;font-weight:700;min-width:120px;text-align:center}

  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:22px 0}
  .card{background:#fff;border:1px solid var(--rule);border-radius:14px;padding:16px 18px}
  .card .eyebrow{font-size:12px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;font-weight:700}
  .card .amt{font-size:25px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
  .card.income .amt{color:var(--teal)}
  .card.expense .amt{color:var(--coral)}
  .card.balance .amt{color:var(--ink)}

  .grid2{display:grid;grid-template-columns:340px 1fr;gap:22px;align-items:start}
  @media(max-width:840px){.grid2{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}

  .panel{background:#fff;border:1px solid var(--rule);border-radius:14px;padding:18px}
  .panel h2{font-size:14px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .panel h2 .mini{font-size:12px;font-weight:700;color:var(--teal);cursor:pointer;text-transform:none;letter-spacing:0}

  .seg{display:flex;background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:4px;margin-bottom:14px}
  .seg button{flex:1;border:none;background:none;padding:9px;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted)}
  .seg button.on.exp{background:var(--coral);color:#fff}
  .seg button.on.inc{background:var(--teal);color:#fff}
  .seg button.on.mov{background:var(--ink);color:#fff}
  .seg.seg4 button{font-size:13px;padding:8px 4px}
  .seg.seg-sm{margin-bottom:0}
  .seg.seg-sm button{padding:7px 4px;font-size:12px}
  .seg.seg-sm button.on{background:var(--ink);color:#fff}
  #chartCat button.on.exp{background:var(--coral);color:#fff}
  #chartCat button.on.inc{background:var(--teal);color:#fff}
  #listFilter button.on.exp{background:var(--coral);color:#fff}
  #listFilter button.on.inc{background:var(--teal);color:#fff}
  #listFilter button.on.mov{background:var(--ink);color:#fff}
  .chartctl{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .chartctl .seg{flex:1;min-width:180px}
  .periodnav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
  .periodnav button{border:1px solid var(--rule);background:#fff;width:32px;height:32px;border-radius:8px;font-size:17px;cursor:pointer;color:var(--ink)}
  .periodnav button:hover{background:var(--ink);color:#fff}
  .periodnav #clabel{font-size:14px;font-weight:700;min-width:150px;text-align:center}
  .pielegend{margin-top:14px;display:flex;flex-direction:column;gap:2px}
  .legrow{display:flex;align-items:center;gap:9px;padding:8px 6px;border-bottom:1px solid var(--rule);font-size:13px}
  .legrow:last-child{border-bottom:none}
  .legrow.legclick{cursor:pointer;border-radius:8px}
  .legrow.legclick:hover{background:var(--paper)}
  .legdot{width:11px;height:11px;border-radius:3px;flex:none}
  .legname{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .legval{font-variant-numeric:tabular-nums;color:var(--muted);flex:none}
  .legchev{color:var(--muted);flex:none;font-weight:700}
  #drillcrumb{margin-bottom:10px}
  #drillcrumb a.dcrumb{color:var(--teal);cursor:pointer;font-weight:700}
  #drillcrumb a.dcrumb:hover{text-decoration:underline}
  .tx .dot.mov{background:var(--ink)!important}
  label.fld{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:12px 0 5px}
  input,select{width:100%;padding:10px 12px;border:1px solid var(--rule);border-radius:9px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus{outline:2px solid var(--teal);outline-offset:-1px;border-color:var(--teal)}
  .submit{width:100%;margin-top:16px;padding:12px;border:none;border-radius:10px;background:var(--ink);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
  .submit:hover{opacity:.88}
  .submit.alt{background:#fff;color:var(--ink);border:1px solid var(--rule);margin-top:8px}

  .tx{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--rule)}
  .tx:last-child{border-bottom:none}
  .tx .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .tx .meta{flex:1;min-width:0}
  .tx .meta .cat{font-weight:700;font-size:14px}
  .tx .meta .sub{font-size:12px;color:var(--muted)}
  .tx .badge{font-size:10px;font-weight:800;padding:1px 6px;border-radius:20px;background:var(--teal-soft);color:var(--teal);margin-left:6px;vertical-align:middle}
  .tx .val{font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .tx .del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:6px}
  .tx .del:hover{background:var(--coral-soft);color:var(--coral)}
  .empty{text-align:center;color:var(--muted);padding:34px 0;font-size:14px}
  .daygroup{margin-bottom:6px}
  .budrow.editing{outline:2px solid var(--teal);outline-offset:1px;border-radius:10px}
  .dayhead{display:flex;justify-content:space-between;align-items:center;padding:8px 2px 6px;border-bottom:1.5px solid var(--rule);margin-bottom:2px;position:sticky;top:0;background:var(--paper)}
  .dayhead .dayname{font-size:12.5px;font-weight:800;color:var(--ink)}
  .dayhead .daysum{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}

  .barrow{margin-bottom:13px}
  .barrow .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
  .barrow .top b{font-weight:700}
  .barrow .top .n{font-variant-numeric:tabular-nums;color:var(--muted)}
  .track{height:9px;background:var(--paper);border-radius:6px;overflow:hidden;border:1px solid var(--rule)}
  .fill{height:100%;border-radius:6px;transition:width .4s}

  .budrow{padding:12px 0;border-bottom:1px solid var(--rule)}
  .budrow:last-child{border-bottom:none}
  .budrow .top{display:flex;justify-content:space-between;align-items:center;font-size:14px;margin-bottom:6px}
  .budrow .top .left{font-weight:700;display:flex;align-items:center;gap:7px}
  .pill{font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px}
  .pill.ok{background:var(--teal-soft);color:var(--teal)}
  .pill.warn{background:#faf0d7;color:var(--gold)}
  .pill.over{background:var(--coral-soft);color:var(--coral)}
  .budrow .nums{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .setrow{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .setrow select,.setrow input{flex:1;min-width:90px}
  .setrow button{flex:none;padding:0 14px;border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:9px;font-weight:700;cursor:pointer;height:42px}

  .tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--rule);flex-wrap:wrap}
  .tabs button{border:none;background:none;padding:10px 4px;margin-right:14px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabs button.on{color:var(--ink);border-bottom-color:var(--ink)}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:14px;line-height:1.7}
  .foot a{color:var(--teal);cursor:pointer}
  .networth{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;margin-bottom:16px;border-radius:14px;background:linear-gradient(135deg,var(--ink),#2a2f45);color:#fff;flex-wrap:wrap}
  .networth .nw-main{display:flex;flex-direction:column}
  .networth .nw-label{font-size:12px;letter-spacing:.06em;color:#c9cdd8;font-weight:700}
  .networth .nw-amt{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px}
  .networth .nw-amt.neg{color:#ff9b8f}
  .networth .nw-break{display:flex;gap:16px;font-size:12px}
  .networth .nw-break div{text-align:right}
  .networth .nw-break .k{color:#c9cdd8;font-weight:700}
  .networth .nw-break .v{font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px}
  .syncbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:30px;padding:14px 18px;background:#fff;border:1px solid var(--rule);border-radius:14px;flex-wrap:wrap}
  .syncstatus{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700}
  .syncdot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex:none;transition:.2s}
  .syncdot.linked{background:var(--teal)}
  .syncdot.dirty{background:var(--gold)}
  .syncactions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .syncbtn{border:1px solid var(--rule);background:#fff;color:var(--ink);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
  .syncbtn:hover{background:var(--paper)}
  .syncbtn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .syncbtn.primary:hover{opacity:.88;background:var(--ink)}
  .syncbtn.ghost{border-color:transparent;color:var(--teal);padding:8px 8px}
  .syncbtn.ghost:hover{background:var(--teal-soft)}

  /* category manager rows */
  .catrow{display:flex;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px solid var(--rule)}
  .catrow:last-child{border-bottom:none}
  .catrow .nm{flex:1;font-weight:700;font-size:14px}
  .catrow .cnt{font-size:12px;color:var(--muted)}
  .catrow button{border:1px solid var(--rule);background:#fff;border-radius:7px;padding:4px 9px;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink)}
  .catrow button:hover{background:var(--paper)}
  .catrow button.danger:hover{background:var(--coral-soft);color:var(--coral);border-color:var(--coral)}
  /* tree levels */
  .cnode{border-bottom:1px solid var(--rule)}
  .cnode:last-child{border-bottom:none}
  .crow{display:flex;align-items:center;gap:8px;padding:9px 4px}
  .crow .tw{flex:none;width:18px;text-align:center;cursor:pointer;color:var(--muted);font-size:11px;user-select:none}
  .crow .tw.empty{cursor:default;opacity:.25}
  .crow .nm{flex:1;font-weight:700;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crow .cnt{font-size:11px;color:var(--muted);flex:none}
  .crow .acts{display:flex;gap:4px;flex:none}
  .crow .acts button{border:1px solid var(--rule);background:#fff;border-radius:7px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink)}
  .crow .acts button:hover{background:var(--paper)}
  .crow .acts button.danger:hover{background:var(--coral-soft);color:var(--coral);border-color:var(--coral)}
  .lvl1{padding-left:26px;background:rgba(0,0,0,.012)}
  .lvl2{padding-left:50px;background:rgba(0,0,0,.025)}
  .lvl1 .nm{font-weight:600;font-size:13px}
  .lvl2 .nm{font-weight:400;font-size:13px;color:var(--muted)}
  .lvl1 .nm::before{content:'└ ';color:var(--rule)}
  .lvl2 .nm::before{content:'└ ';color:var(--rule)}
  .childwrap{display:none}
  .childwrap.open{display:block}
  /* assets */
  .asrow{display:flex;align-items:center;gap:10px;padding:12px 6px;border-bottom:1px solid var(--rule)}
  .asrow:last-child{border-bottom:none}
  .asrow .anm{font-weight:700;font-size:15px;flex:none;min-width:64px}
  .asrow .abal{flex:1;text-align:right;font-weight:800;font-variant-numeric:tabular-nums;font-size:16px}
  .asrow .abal.neg{color:var(--coral)}
  .asrow .aedit{flex:none}
  .asrow .aedit input{width:120px;text-align:right;padding:6px 8px;font-size:14px}
  .asrow .acts{display:flex;gap:5px;flex:none}
  .asrow .acts button{border:1px solid var(--rule);background:#fff;border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink)}
  .asrow .acts button:hover{background:var(--paper)}
  .asrow .acts button.danger:hover{background:var(--coral-soft);color:var(--coral);border-color:var(--coral)}
  .asrow .acts button.save{background:var(--ink);color:#fff;border-color:var(--ink)}
  .asrow .sub2{font-size:11px;color:var(--muted);margin-top:2px}
  .assethead{display:flex;justify-content:space-between;align-items:baseline;padding:10px 6px;border-bottom:2px solid var(--ink);font-size:12px;color:var(--muted);font-weight:700}
  /* drill-down category manager */
  .catcrumb{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:13px;margin-bottom:12px;color:var(--muted)}
  .catcrumb .seg-c{display:inline-flex;align-items:center;gap:4px}
  .catcrumb a{color:var(--teal);cursor:pointer;font-weight:700}
  .catcrumb a:hover{text-decoration:underline}
  .catcrumb .cur{font-weight:700;color:var(--ink)}
  .catcrumb .sep{color:var(--rule)}
  .crow2{display:flex;align-items:center;gap:8px;padding:11px 6px;border-bottom:1px solid var(--rule);border-radius:8px}
  .crow2:last-child{border-bottom:none}
  .crow2 .nav{flex:1;display:flex;align-items:center;gap:8px;min-width:0;cursor:pointer;background:none;border:none;text-align:left;font-family:inherit;padding:2px 0}
  .crow2 .nav .nm{font-weight:700;font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crow2 .nav.leaf{cursor:default}
  .crow2 .nav .chev{flex:none;color:var(--muted);font-size:13px;width:14px}
  .crow2 .nav .chev.hide{visibility:hidden}
  .crow2 .cnt{font-size:11px;color:var(--muted);flex:none}
  .crow2 .acts{display:flex;gap:4px;flex:none}
  .crow2 .acts button{border:1px solid var(--rule);background:#fff;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink)}
  .crow2 .acts button:hover{background:var(--paper)}
  .crow2 .acts button.danger:hover{background:var(--coral-soft);color:var(--coral);border-color:var(--coral)}
  .crow2 .nav:not(.leaf):hover .nm{color:var(--teal)}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(26,29,41,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal.show{display:flex}
  .modalbox{background:#fff;border-radius:16px;padding:24px;max-width:440px;width:100%;max-height:88vh;overflow:auto}
  .modalbox h3{font-size:18px;font-weight:800;margin-bottom:4px}
  .modalbox p.lead{font-size:13px;color:var(--muted);margin-bottom:16px}
  .mbtns{display:flex;gap:8px;margin-top:18px}
  .mbtns button{flex:1;padding:11px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--rule);background:#fff;color:var(--ink)}
  .mbtns button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .mbtns button.skip{color:var(--muted)}
  .askitem{background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:12px;margin-bottom:10px}
  .askitem .q{font-weight:700;font-size:14px;margin-bottom:8px}
  .askitem .q small{font-weight:400;color:var(--muted)}
  .askitem input{background:#fff}
  .toggle{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>우리집 <span>가계부</span></h1>
    <div class="monthnav">
      <button id="prev" aria-label="이전">‹</button>
      <div class="label" id="mlabel"></div>
      <button id="next" aria-label="다음">›</button>
    </div>
  </header>

  <div class="seg seg-sm" id="listPeriod" style="margin-bottom:14px">
    <button data-pd="day">일</button>
    <button data-pd="week">주</button>
    <button class="on" data-pd="month">월</button>
    <button data-pd="year">년</button>
  </div>

  <div class="cards">
    <div class="card income"><div class="eyebrow">수입</div><div class="amt" id="sumInc">0원</div></div>
    <div class="card expense"><div class="eyebrow">지출</div><div class="amt" id="sumExp">0원</div></div>
    <div class="card balance"><div class="eyebrow">잔액</div><div class="amt" id="sumBal">0원</div></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <h2>입력</h2>
      <div class="seg seg4" id="seg">
        <button class="on exp" data-t="expense">지출</button>
        <button data-t="income">수입</button>
        <button data-t="transfer">이체</button>
      </div>
      <label class="fld">금액</label>
      <input type="number" id="amt" placeholder="0" inputmode="numeric">

      <!-- income/expense fields -->
      <div id="ieFields">
        <label class="fld">대분류</label>
        <select id="cat"></select>
        <label class="fld">중분류 (선택)</label>
        <select id="sub"></select>
        <label class="fld">소분류 (선택)</label>
        <select id="sub2"></select>
        <label class="fld" id="payeeLabel">거래처 (선택)</label>
        <input type="text" id="payee" list="payeeList" placeholder="예: 스타벅스" autocomplete="off">
        <datalist id="payeeList"></datalist>
        <label class="fld" id="acctLabel">출처 (선택)</label>
        <select id="acct"></select>
      </div>

      <!-- transfer / cardpay fields -->
      <div id="moveFields" style="display:none">
        <label class="fld" id="fromLabel">출금</label>
        <select id="fromSel"></select>
        <label class="fld" id="toLabel">입금</label>
        <select id="toSel"></select>
      </div>

      <label class="fld">내용 (선택)</label>
      <input type="text" id="memo" placeholder="예: 점심 식사">
      <label class="fld">날짜</label>
      <input type="date" id="date">
      <button class="submit" id="add">기록 추가</button>
    </div>

    <div>
      <div class="tabs">
        <button class="on" data-tab="list">내역</button>
        <button data-tab="assets">자산</button>
        <button data-tab="chart">분류별 차트</button>
        <button data-tab="payeestat">거래처별</button>
        <button data-tab="budget">예산</button>
        <button data-tab="recur">반복 항목</button>
        <button data-tab="cats">분류 관리</button>
      </div>

      <div class="panel" id="tab-list">
        <div class="seg seg-sm" id="listFilter" style="margin-bottom:12px">
          <button class="on" data-lf="all">전체</button>
          <button data-lf="expense">지출</button>
          <button data-lf="income">수입</button>
          <button data-lf="move">이체</button>
        </div>
        <div id="txlist"></div>
      </div>

      <div class="panel" id="tab-assets" style="display:none">
        <div class="networth" id="networth"></div>

<script>
const won = n => Math.round(n).toLocaleString('ko-KR')+'원';
const COLORS=['#c0463b','#0f6e6e','#b8860b','#7a5c9e','#4a7a4a','#c97b3b','#3b6ea5','#a64d6f','#5a6470','#8a7a3b'];
// default tree: 대분류 → 중분류 → 소분류 (소분류는 비워둠, 사용자가 채움)
const DEF_EX=['식비','교통','주거/통신','생활용품','의료/건강','문화/여가','교육','경조사','기타'];
const DEF_IN=['급여','부수입','금융수입','용돈','기타'];
const node=(name)=>({name,children:[]});
const defTree=(arr)=>arr.map(node);

let state = load();
let cur = new Date(); cur.setDate(1);
let listPeriod='month';      // day|week|month|year — granularity of the 내역 list
let listFilter='all';        // all|expense|income|move — type filter of the 내역 list
let listRef = new Date();    // reference date for the list period window
let type='expense', tab='list', rType='expense', cType='expense';
let treeOpen={}; // (legacy, unused)
let catNav={big:null, mid:null}; // drill-down position in 분류 관리
let payeeStatType='expense'; // which side the 거래처별 tab shows
let chartLevel=0;            // 0=대,1=중,2=소
let chartPeriod='month';     // day|week|month|year
let chartType='expense';     // expense|income
let chartRef=new Date();     // reference date for the current period window
let chartViewMode='share';   // share|drill|trend
let chartDrill={big:null,mid:null}; // drilldown position
let trendSpan=12;            // number of periods back for trend
let editingAsset=null; // asset id currently being balance-edited
let editingLiab=null; // liability id currently being balance-edited

/* ---- tree helpers ---- */
function findBig(tType,name){ return state.cats[tType].find(b=>b.name===name); }
function findMid(big,name){ return big && big.children.find(m=>m.name===name); }
function bigNames(tType){ return state.cats[tType].map(b=>b.name); }
function midNames(tType,big){ const b=findBig(tType,big); return b?b.children.map(m=>m.name):[]; }
function subNames(tType,big,mid){ const b=findBig(tType,big); const m=b&&findMid(b,mid); return m?m.children.map(s=>s.name):[]; }

/* ---- account model (assets, liabilities, cards) ----
   tx.type: 'income' | 'expense' | 'transfer' | 'cardpay'
   For income/expense: tx.acct = payment source / deposit target
     'asset:<id>'        → directly affects that asset (income +, expense -)
     'card:<id>'         → check card: subtract linked asset (expense)
                           credit card: add to linked liability, asset untouched
   For transfer:  tx.from, tx.to  (each 'asset:<id>' or 'liab:<id>'); out from→, into to←
   For cardpay:   tx.from = paying asset ('asset:<id>'), tx.to = card/liability being paid
                  ('card:<id>' or 'liab:<id>'); subtracts asset, reduces liability.
*/
function assetById(id){ return state.assets.find(a=>a.id===id); }
function liabById(id){ return (state.liabilities||[]).find(l=>l.id===id); }
function cardById(id){ return state.cards.find(c=>c.id===id); }
function uid(p){ return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function isCredit(c){ return c && c.kind==='credit'; }
// the liability id a credit card accrues into
function cardLiabId(card){ return isCredit(card)? card.liabId : ''; }

// effect of a single tx on a given asset id (signed)
function txAssetDelta(t,assetId){
  let d=0;
  if(t.type==='income'){ if(t.acct==='asset:'+assetId) d+=t.amt; }
  else if(t.type==='expense'){
    if(t.acct==='asset:'+assetId) d-=t.amt;
    else if(t.acct&&t.acct.startsWith('card:')){
      const c=cardById(t.acct.slice(5));
      if(c && !isCredit(c) && c.assetId===assetId) d-=t.amt; // check card hits asset
      // credit card: no asset effect at purchase time
    }
  }else if(t.type==='transfer'){
    if(t.from==='asset:'+assetId) d-=t.amt;
    if(t.to==='asset:'+assetId) d+=t.amt;
  }else if(t.type==='cardpay'){
    if(t.from==='asset:'+assetId) d-=t.amt; // paying asset decreases
  }
  return d;
}
// effect of a single tx on a given liability id (signed; positive = more debt)
function txLiabDelta(t,liabId){
  let d=0;
  if(t.type==='expense' && t.acct && t.acct.startsWith('card:')){
    const c=cardById(t.acct.slice(5));
    if(isCredit(c) && c.liabId===liabId) d+=t.amt; // credit purchase adds debt
  }else if(t.type==='transfer'){
    if(t.from==='liab:'+liabId) d-=t.amt; // pulling from a liability reduces it (rare)
    if(t.to==='liab:'+liabId) d+=t.amt;
  }else if(t.type==='cardpay'){
    // to may be 'card:<id>' (resolve to its liab) or 'liab:<id>'
    let tgt=null;
    if(t.to&&t.to.startsWith('liab:')) tgt=t.to.slice(5);
    else if(t.to&&t.to.startsWith('card:')){ const c=cardById(t.to.slice(5)); tgt=c?cardLiabId(c):null; }
    if(tgt===liabId) d-=t.amt; // payment reduces debt
  }
  return d;
}
function assetBalance(id){
  const a=assetById(id); if(!a) return 0;
  let bal=a.opening||0;
  state.tx.forEach(t=>{ bal+=txAssetDelta(t,id); });
  return bal;
}
function liabBalance(id){
  const l=liabById(id); if(!l) return 0;
  let bal=l.opening||0;
  state.tx.forEach(t=>{ bal+=txLiabDelta(t,id); });
  return bal;
}

// options for income/expense 출처 select
function acctOptions(forType){
  let html='<option value="">— 미지정 —</option>';
  html+='<optgroup label="자산">'+state.assets.map(a=>`<option value="asset:${a.id}">${esc(a.name)}</option>`).join('')+'</optgroup>';
  if(state.cards.length && forType==='expense'){
    html+='<optgroup label="카드">'+state.cards.map(c=>{
      const tag = isCredit(c)?'신용':'체크';
      const link = isCredit(c)? (liabById(c.liabId)?.name||'') : (assetById(c.assetId)?.name||'');
      return `<option value="card:${c.id}">${esc(c.name)} [${tag}]${link?` (${esc(link)})`:''}</option>`;
    }).join('')+'</optgroup>';
  }
  return html;
}
// options listing assets (and optionally liabilities) for transfer/cardpay endpoints
function endpointOptions(opts){
  // opts: {assets:true, liabs:true, cards:false, placeholder:'...'}
  let html=`<option value="">${opts.placeholder||'— 선택 —'}</option>`;
  if(opts.assets) html+='<optgroup label="자산">'+state.assets.map(a=>`<option value="asset:${a.id}">${esc(a.name)}</option>`).join('')+'</optgroup>';
  if(opts.cards && state.cards.filter(isCredit).length) html+='<optgroup label="신용카드">'+state.cards.filter(isCredit).map(c=>`<option value="card:${c.id}">${esc(c.name)}</option>`).join('')+'</optgroup>';
  if(opts.liabs && (state.liabilities||[]).length) html+='<optgroup label="부채">'+state.liabilities.map(l=>`<option value="liab:${l.id}">${esc(l.name)}</option>`).join('')+'</optgroup>';
  return html;
}
// short display label for an endpoint string (asset:/liab:/card:)
function endpointLabel(s){
  if(!s) return '';
  if(s.startsWith('asset:')) return esc(assetById(s.slice(6))?.name||'');
  if(s.startsWith('liab:')) return esc(liabById(s.slice(5))?.name||'');
  if(s.startsWith('card:')) return esc(cardById(s.slice(5))?.name||'');
  return '';
}
// label for income/expense tx.acct
function acctLabel(acct){
  if(!acct) return '';
  if(acct.startsWith('asset:')){ const a=assetById(acct.slice(6)); return a?esc(a.name):''; }
  if(acct.startsWith('card:')){ const c=cardById(acct.slice(5)); if(!c)return '';
    if(isCredit(c)){ const l=liabById(c.liabId); return esc(c.name)+(l?` › ${esc(l.name)}`:''); }
    const a=assetById(c.assetId); return esc(c.name)+(a?` › ${esc(a.name)}`:''); }
  return '';
}

function load(){
  let d;
  try{ d = JSON.parse(localStorage.getItem('budgetData')) || {}; }catch(e){ d={}; }
  if(!d.tx) d.tx=[];
  if(!d.budgets) d.budgets={};
  if(!d.recur) d.recur=[];
  if(!d.recurLog) d.recurLog={};
  if(!d.assets){
    // default assets: 현금, 통장
    d.assets=[{id:'a_cash',name:'현금',opening:0},{id:'a_bank',name:'통장',opening:0}];
  }
  if(!d.liabilities){
    d.liabilities=[];
  }
  if(!d.cards){
    // default a check card linked to 통장
    d.cards=[{id:'c_main',name:'카드',kind:'check',assetId:'a_bank',liabId:''}];
  }
  // migrate old cards (no kind) → treat as check cards
  d.cards.forEach(c=>{ if(!c.kind){ c.kind='check'; if(!('liabId' in c)) c.liabId=''; } });
  d = migrateCats(d);
  return d;
}
/* migrate flat string[] categories → tree [{name,children}]; preserve old tx.cat as 대분류 */
function migrateCats(d){
  if(!d.cats){ d.cats={expense:defTree(DEF_EX),income:defTree(DEF_IN)}; return d; }
  ['expense','income'].forEach(tp=>{
    let arr=d.cats[tp];
    if(!Array.isArray(arr)){ d.cats[tp]=defTree(tp==='expense'?DEF_EX:DEF_IN); return; }
    // already tree?
    if(arr.length===0 || typeof arr[0]==='object'){ 
      // ensure shape
      d.cats[tp]=arr.map(b=>({name:b.name,children:(b.children||[]).map(m=>({name:m.name,children:(m.children||[]).map(s=>({name:s.name,children:[]}))}))}));
      return;
    }
    // flat strings → big-categories
    d.cats[tp]=arr.map(name=>node(name));
  });
  // make sure any tx.cat that isn't in the tree still gets a home (보존)
  d.tx.forEach(t=>{
    if(!t.cat) return;
    if(!d.cats[t.type]) return;
    if(!d.cats[t.type].some(b=>b.name===t.cat)) d.cats[t.type].push(node(t.cat));
  });
  return d;
}
function save(){
  localStorage.setItem('budgetData', JSON.stringify(state));
  driveDirty=true;
  updateSyncUI();
  scheduleDriveSave();
}


const $=id=>document.getElementById(id);
const mkey = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
// self-contained date helpers for the 내역 list (no dependency on chart helpers)
const _ymd = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
function _startOfWeek(d){ const x=new Date(d.getFullYear(),d.getMonth(),d.getDate()); const wd=(x.getDay()+6)%7; x.setDate(x.getDate()-wd); return x; }
// returns {from,to,label} for the current listPeriod around listRef
function listRange(){
  const d=listRef;
  if(listPeriod==='day'){
    const s=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    return {from:_ymd(s),to:_ymd(s),label:`${s.getFullYear()}년 ${s.getMonth()+1}월 ${s.getDate()}일`};
  }
  if(listPeriod==='week'){
    const s=_startOfWeek(d); const e=new Date(s); e.setDate(s.getDate()+6);
    return {from:_ymd(s),to:_ymd(e),label:`${s.getMonth()+1}.${s.getDate()} ~ ${e.getMonth()+1}.${e.getDate()}`};
  }
  if(listPeriod==='year'){
    const s=new Date(d.getFullYear(),0,1), e=new Date(d.getFullYear(),11,31);
    return {from:_ymd(s),to:_ymd(e),label:`${d.getFullYear()}년`};
  }
  const s=new Date(d.getFullYear(),d.getMonth(),1), e=new Date(d.getFullYear(),d.getMonth()+1,0);
  return {from:_ymd(s),to:_ymd(e),label:`${d.getFullYear()}년 ${d.getMonth()+1}월`};
}
function shiftListPeriod(dir){
  const d=new Date(listRef);
  if(listPeriod==='day') d.setDate(d.getDate()+dir);
  else if(listPeriod==='week') d.setDate(d.getDate()+7*dir);
  else if(listPeriod==='year') d.setFullYear(d.getFullYear()+dir);
  else d.setMonth(d.getMonth()+dir);
  listRef=d;
}
// a tx is in the current list window?
let _listFrom='', _listTo='';
const inMonth = t => t.date>=_listFrom && t.date<=_listTo;
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
function clampDay(day,y,m){const last=new Date(y,m+1,0).getDate();return Math.min(day,last);}

/* ---------- input form (3-level cascading) ---------- */
function opt(arr,placeholder){
  let h = placeholder!=null ? `<option value="">${placeholder}</option>` : '';
  return h + arr.map(c=>`<option>${esc(c)}</option>`).join('');
}
function fillCats(){
  $('cat').innerHTML = opt(bigNames(type),null);
  syncInputSubs();
}
function syncInputSubs(){
  const big=$('cat').value;
  $('sub').innerHTML = opt(midNames(type,big),'— 없음 —');
  syncInputSub2();
}
function syncInputSub2(){
  const big=$('cat').value, mid=$('sub').value;
  $('sub2').innerHTML = opt(subNames(type,big,mid),'— 없음 —');
}
$('cat').onchange=syncInputSubs;
$('sub').onchange=syncInputSub2;
// distinct payees seen so far, for autocomplete (per type)
function payeesFor(tp){
  const set=new Set();
  state.tx.forEach(t=>{ if(t.type===tp && t.payee) set.add(t.payee); });
  state.recur.forEach(r=>{ if(r.type===tp && r.payee) set.add(r.payee); });
  return [...set].sort((a,b)=>a.localeCompare(b,'ko'));
}
function refreshPayeeList(){
  $('payeeLabel').textContent = (type==='expense'?'거래처':'수입처')+' (선택)';
  $('payee').placeholder = type==='expense'?'예: 스타벅스':'예: 회사 급여';
  $('payeeList').innerHTML = payeesFor(type).map(p=>`<option value="${esc(p)}"></option>`).join('');
  refreshAcct();
}
function refreshAcct(){
  $('acctLabel').textContent = (type==='expense'?'출처':'입금 자산')+' (선택)';
  const prev=$('acct').value;
  $('acct').innerHTML = acctOptions(type);
  if(prev && [...$('acct').options].some(o=>o.value===prev)) $('acct').value=prev;
}
// configure form layout + from/to selects for the current type
function applyType(){
  const isMove = type==='transfer';
  $('ieFields').style.display = isMove?'none':'';
  $('moveFields').style.display = isMove?'':'none';
  if(type==='transfer'){
    $('fromLabel').textContent='출금 (자산)';
    $('toLabel').textContent='입금 (자산 / 카드대금·부채상환)';
    $('fromSel').innerHTML=endpointOptions({assets:true,placeholder:'출금 자산 선택'});
    // target can be another asset, OR a credit card / liability (= 카드대금 정산)
    $('toSel').innerHTML=endpointOptions({assets:true,cards:true,liabs:true,placeholder:'입금/납부 대상 선택'});
    $('memo').placeholder='예: 비상금 이체 / 카드 대금';
  }else{
    fillCats();refreshPayeeList();
    $('memo').placeholder='예: 점심 식사';
  }
}
// when the transfer target is a credit card with a linked payment account, prefill 출금 통장
$('toSel').onchange=()=>{
  if(type!=='transfer') return;
  const to=$('toSel').value;
  if(to&&to.startsWith('card:')){
    const c=cardById(to.slice(5));
    if(c && c.assetId){
      const opt=[...$('fromSel').options].find(o=>o.value==='asset:'+c.assetId);
      if(opt) $('fromSel').value='asset:'+c.assetId;
    }
  }
};
$('seg').onclick=e=>{const b=e.target.closest('button');if(!b)return;type=b.dataset.t;
  [...$('seg').children].forEach(x=>x.className='');
  const cls = type==='expense'?'exp':type==='income'?'inc':'mov';
  b.className='on '+cls;
  applyType();};
$('add').onclick=()=>{
  const amt=parseFloat($('amt').value);
  if(!amt||amt<=0){$('amt').focus();return;}
  if(type==='transfer'){
    const from=$('fromSel').value, to=$('toSel').value;
    if(!from){alert('출금 계정을 선택하세요.');return;}
    if(!to){alert('입금/납부 대상을 선택하세요.');return;}
    if(from===to){alert('출금과 입금이 같습니다.');return;}
    // if target is a card or liability, store as a 'cardpay' settlement so it
    // reduces debt (and is excluded from 지출). asset→asset stays a 'transfer'.
    const isSettle = to.startsWith('card:') || to.startsWith('liab:');
    const txType = isSettle ? 'cardpay' : 'transfer';
    state.tx.push({id:Date.now(),type:txType,amt,from,to,memo:$('memo').value.trim(),date:$('date').value});
  }else{
    state.tx.push({id:Date.now(),type,amt,cat:$('cat').value,sub:$('sub').value||'',sub2:$('sub2').value||'',payee:$('payee').value.trim(),acct:$('acct').value||'',memo:$('memo').value.trim(),date:$('date').value});
  }
  save();$('amt').value='';$('payee').value='';$('memo').value='';
  if(type==='expense'||type==='income') refreshPayeeList();
  render();
};

$('prev').onclick=()=>{shiftListPeriod(-1);render();checkRecur();};
$('next').onclick=()=>{shiftListPeriod(1);render();checkRecur();};
$('listPeriod').onclick=e=>{const b=e.target.closest('button');if(!b)return;listPeriod=b.dataset.pd;
  [...$('listPeriod').children].forEach(x=>x.classList.toggle('on',x===b));render();};
$('listFilter').onclick=e=>{const b=e.target.closest('button');if(!b)return;listFilter=b.dataset.lf;
  [...$('listFilter').children].forEach(x=>{x.classList.remove('on','exp','inc','mov');});
  b.classList.add('on');

  else if(listFilter==='income') b.classList.add('inc');

  $('rCat').innerHTML=opt(bigNames(rType),null);
  $('rAcct').innerHTML=acctOptions(rType);
  syncRSubs();
}
function syncRSubs(){
  const big=$('rCat').value;
  $('rSub').innerHTML=opt(midNames(rType,big),'— 없음 —');
  syncRSub2();
}
function syncRSub2(){
  const big=$('rCat').value, mid=$('rSub').value;
  $('rSub2').innerHTML=opt(subNames(rType,big,mid),'— 없음 —');
}
$('rCat').onchange=syncRSubs;
$('rSub').onchange=syncRSub2;
$('rseg').onclick=e=>{const b=e.target.closest('button');if(!b)return;rType=b.dataset.t;
  [...$('rseg').children].forEach(x=>x.className='');b.className='on '+(rType==='expense'?'exp':'inc');
  fillRCats();};
let editingRecur=null; // id of the recur item being edited (null = adding new)
$('rAdd').onclick=()=>{
  const memo=$('rMemo').value.trim();
  const mode=$('rMode').value;
  const amt=parseFloat($('rAmt').value);
  const day=parseInt($('rDay').value);
  if(!memo){$('rMemo').focus();return;}
  if(!day||day<1||day>31){alert('실행일을 1~31 사이로 입력하세요.');$('rDay').focus();return;}
  if(mode==='fixed' && (!amt||amt<=0)){alert('고정 금액 항목은 금액을 입력해야 합니다.');$('rAmt').focus();return;}
  const fields={type:rType,cat:$('rCat').value,sub:$('rSub').value||'',sub2:$('rSub2').value||'',payee:$('rPayee').value.trim(),acct:$('rAcct').value||'',memo,mode,amt:amt||0,day};
  if(editingRecur){
    const r=state.recur.find(x=>x.id===editingRecur);
    if(r) Object.assign(r,fields); // keep id & createdAt
    editingRecur=null;
    $('rAdd').textContent='반복 항목 추가';
    const c=$('rCancelEdit'); if(c) c.style.display='none';
  }else{
    // createdAt marks the registration date; recurring runs only on/after this date
    fields.id=Date.now();
    fields.createdAt=todayStr();
    state.recur.push(fields);
  }
  save();$('rMemo').value='';$('rPayee').value='';$('rAmt').value='';$('rDay').value='';render();checkRecur();
};
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function startRecurEdit(id){
  const r=state.recur.find(x=>x.id==id); if(!r) return;
  editingRecur=r.id;
  // set type seg + category cascade
  rType=r.type;
  [...$('rseg').children].forEach(x=>{x.className='';if(x.dataset.t===rType)x.className='on '+(rType==='expense'?'exp':'inc');});
  fillRCats();
  $('rCat').value=r.cat||''; syncRSubs(); $('rSub').value=r.sub||''; syncRSub2(); $('rSub2').value=r.sub2||'';
  $('rPayee').value=r.payee||'';
  if($('rAcct')) { $('rAcct').innerHTML=acctOptions(rType); $('rAcct').value=r.acct||''; }
  $('rMemo').value=r.memo||'';
  $('rMode').value=r.mode; 
  $('rAmt').value=r.amt||'';
  $('rDay').value=r.day||'';
  $('rAdd').textContent='수정 완료';
  let c=$('rCancelEdit');
  if(!c){ c=document.createElement('button'); c.id='rCancelEdit'; c.textContent='취소'; c.className='syncbtn ghost'; c.style.marginTop='8px';
    c.onclick=cancelRecurEdit; $('rAdd').insertAdjacentElement('afterend',c); }
  c.style.display='';
  // scroll the form into view
  if($('rMemo').scrollIntoView) $('rMemo').scrollIntoView({behavior:'smooth',block:'center'});
}
function cancelRecurEdit(){
  editingRecur=null; $('rAdd').textContent='반복 항목 추가';
  const c=$('rCancelEdit'); if(c) c.style.display='none';
  $('rMemo').value='';$('rPayee').value='';$('rAmt').value='';$('rDay').value='';
  render();
}

/* ---------- category management (drill-down) ---------- */
$('cseg').onclick=e=>{const b=e.target.closest('button');if(!b)return;cType=b.dataset.t;
  [...$('cseg').children].forEach(x=>x.className='');b.className='on '+(cType==='expense'?'exp':'inc');
  catNav={big:null,mid:null};render();};

/* current depth: 0 = list of 대분류, 1 = inside a 대분류 (중분류 list), 2 = inside a 중분류 (소분류 list) */
function catLevel(){ return catNav.mid!=null?2 : catNav.big!=null?1 : 0; }

$('catAdd').onclick=()=>{
  const name=$('newCat').value.trim();
  if(!name){$('newCat').focus();return;}
  const lvl=catLevel();
  if(lvl===0){
    if(findBig(cType,name)){alert('이미 있는 대분류입니다.');return;}
    state.cats[cType].push(node(name));
  }else if(lvl===1){
    const big=findBig(cType,catNav.big);
    if(findMid(big,name)){alert('이미 있는 중분류입니다.');return;}
    big.children.push(node(name));
  }else{
    const big=findBig(cType,catNav.big), mid=findMid(big,catNav.mid);
    if(mid.children.some(s=>s.name===name)){alert('이미 있는 소분류입니다.');return;}
    mid.children.push(node(name));
  }
  save();$('newCat').value='';render();fillCats();fillRCats();
};

/* delegated clicks: tx/budget/recur deletes + category drill-down + actions */
document.body.addEventListener('click',e=>{
  const d=e.target.closest('.del[data-id]');
  if(d){state.tx=state.tx.filter(t=>t.id!=d.dataset.id);save();render();return;}
  const bd=e.target.closest('.buddel');
  if(bd){delete state.budgets[bd.dataset.c];save();render();return;}
  const rd=e.target.closest('.recurdel');
  if(rd){ const r=state.recur.find(x=>x.id==rd.dataset.id);
    if(r && !confirm(`반복 항목 '${r.memo}'을(를) 삭제할까요?`)) return;
    state.recur=state.recur.filter(r=>r.id!=rd.dataset.id);
    if(editingRecur==rd.dataset.id){ editingRecur=null; $('rAdd').textContent='반복 항목 추가'; const c=$('rCancelEdit'); if(c) c.style.display='none'; }
    save();render();return;}
  const re=e.target.closest('.recuredit');
  if(re){ startRecurEdit(re.dataset.id); return; }
  // breadcrumb navigation
  const crumb=e.target.closest('.crumbnav');
  if(crumb){ const to=crumb.dataset.to;
    if(to==='root'){catNav={big:null,mid:null};} else if(to==='big'){catNav.mid=null;}
    renderCatManager();return; }
  // drill into a category
  const nav=e.target.closest('.nav[data-drill]');
  if(nav){ const lvl=catLevel(); const nm=nav.dataset.name;
    if(lvl===0){catNav.big=nm;catNav.mid=null;} else if(lvl===1){catNav.mid=nm;}
    renderCatManager();return; }
  // rename / merge / delete buttons
  const cb=e.target.closest('.catbtn');
  if(cb){ catAction(cb.dataset.act, +cb.dataset.lvl, cb.dataset.big, cb.dataset.mid||'', cb.dataset.sub||''); return; }
});

/* count how many tx+recur reference a given big/mid/sub path */
function countUse(lvl,big,mid,sub){
  const match=(o)=>{
    if(o.type!==cType) return false;
    if(lvl===0) return o.cat===big;
    if(lvl===1) return o.cat===big && (o.sub||'')===mid;
    return o.cat===big && (o.sub||'')===mid && (o.sub2||'')===sub;
  };
  return state.tx.filter(match).length + state.recur.filter(match).length;
}

function catAction(act,lvl,big,mid,sub){
  const bigNode=findBig(cType,big);
  const midNode=bigNode&&findMid(bigNode,mid);
  const label=lvl===0?'대분류':lvl===1?'중분류':'소분류';
  const cur=lvl===0?big:lvl===1?mid:sub;

  if(act==='rename'){
    const nn=(prompt(`'${cur}' ${label}의 새 이름`,cur)||'').trim();
    if(!nn||nn===cur)return;
    // duplicate check among siblings
    const siblings=lvl===0?bigNames(cType):lvl===1?bigNode.children.map(m=>m.name):midNode.children.map(s=>s.name);
    if(siblings.includes(nn)){alert('같은 단계에 이미 있는 이름입니다.');return;}
    // rename node
    if(lvl===0) bigNode.name=nn; else if(lvl===1) midNode.name=nn; else midNode.children.find(s=>s.name===sub).name=nn;
    // propagate to tx/recur
    const apply=o=>{ if(o.type!==cType)return;
      if(lvl===0 && o.cat===big) o.cat=nn;
      if(lvl===1 && o.cat===big && (o.sub||'')===mid) o.sub=nn;
      if(lvl===2 && o.cat===big && (o.sub||'')===mid && (o.sub2||'')===sub) o.sub2=nn;
    };
    state.tx.forEach(apply);state.recur.forEach(apply);
    if(lvl===0 && state.budgets[big]!=null){state.budgets[nn]=state.budgets[big];delete state.budgets[big];}
    // keep drill-down position pointed at the renamed node
    if(lvl===0 && catNav.big===big) catNav.big=nn;
    if(lvl===1 && catNav.mid===mid) catNav.mid=nn;
    finishCat();return;
  }

  if(act==='del'){
    const used=countUse(lvl,big,mid,sub);
    // also block if it has children
    const hasKids = lvl===0? bigNode.children.length>0 : lvl===1? midNode.children.length>0 : false;
    if(used>0){alert(`'${cur}' ${label}에 연결된 내역/반복 항목이 ${used}건 있습니다.\n삭제 대신 '통합'을 이용하세요.`);return;}
    if(hasKids){alert(`'${cur}' 아래에 하위 분류가 있습니다. 먼저 하위 분류를 정리하거나 통합하세요.`);return;}
    if(lvl===0 && state.cats[cType].length<=1){alert('대분류는 최소 1개 있어야 합니다.');return;}
    if(!confirm(`'${cur}' ${label}을(를) 삭제할까요?`))return;
    if(lvl===0){ state.cats[cType]=state.cats[cType].filter(b=>b.name!==big); delete state.budgets[big]; }
    else if(lvl===1){ bigNode.children=bigNode.children.filter(m=>m.name!==mid); }
    else { midNode.children=midNode.children.filter(s=>s.name!==sub); }
    fixNavAfterRemoval(lvl,big,mid,sub);
    finishCat();return;
  }

  if(act==='merge'){
    // merge into a sibling at the same level/parent
    let siblings, targetParentMsg;
    if(lvl===0){ siblings=bigNames(cType).filter(n=>n!==big); targetParentMsg=''; }
    else if(lvl===1){ siblings=bigNode.children.map(m=>m.name).filter(n=>n!==mid); targetParentMsg=`(${big} 안에서) `; }
    else { siblings=midNode.children.map(s=>s.name).filter(n=>n!==sub); targetParentMsg=`(${big} › ${mid} 안에서) `; }
    if(!siblings.length){alert('통합할 대상(같은 단계의 다른 분류)이 없습니다.');return;}
    const target=(prompt(`'${cur}' ${label}을(를) ${targetParentMsg}어느 분류로 통합할까요?\n선택지: ${siblings.join(', ')}`,siblings[0])||'').trim();
    if(!target)return;
    if(!siblings.includes(target)){alert('목록에 없는 분류입니다.');return;}
    // repoint tx/recur
    const apply=o=>{ if(o.type!==cType)return;
      if(lvl===0 && o.cat===big) o.cat=target;
      if(lvl===1 && o.cat===big && (o.sub||'')===mid) o.sub=target;
      if(lvl===2 && o.cat===big && (o.sub||'')===mid && (o.sub2||'')===sub) o.sub2=target;
    };
    state.tx.forEach(apply);state.recur.forEach(apply);
    // move children of merged node into target (for lvl 0/1), then remove node
    if(lvl===0){
      const tgt=findBig(cType,target);
      bigNode.children.forEach(m=>{ if(!tgt.children.some(x=>x.name===m.name)) tgt.children.push(m); else { const tm=tgt.children.find(x=>x.name===m.name); m.children.forEach(s=>{if(!tm.children.some(y=>y.name===s.name))tm.children.push(s);}); } });
      if(state.budgets[big]!=null){state.budgets[target]=(state.budgets[target]||0)+state.budgets[big];delete state.budgets[big];}
      state.cats[cType]=state.cats[cType].filter(b=>b.name!==big);
    }else if(lvl===1){
      const tgt=findMid(bigNode,target);
      midNode.children.forEach(s=>{ if(!tgt.children.some(x=>x.name===s.name)) tgt.children.push(s); });
      bigNode.children=bigNode.children.filter(m=>m.name!==mid);
    }else{
      midNode.children=midNode.children.filter(s=>s.name!==sub);
    }
    fixNavAfterRemoval(lvl,big,mid,sub);
    finishCat();return;
  }

  if(act==='move'){
    // move a 중분류 to another 대분류, or a 소분류 to another 중분류 (same type only)
    if(lvl===0){ alert('대분류는 이동할 수 없습니다. 중분류·소분류만 이동할 수 있습니다.'); return; }
    if(lvl===1){
      // choose a destination 대분류 (excluding current parent)
      const dests=bigNames(cType).filter(n=>n!==big);
      if(!dests.length){ alert('이동할 대상 대분류가 없습니다. 먼저 다른 대분류를 만드세요.'); return; }
      const dest=(prompt(`'${mid}' 중분류를 어느 대분류로 옮길까요?\n선택지: ${dests.join(', ')}`,dests[0])||'').trim();
      if(!dest)return;
      if(!dests.includes(dest)){ alert('목록에 없는 대분류입니다.'); return; }
      const destBig=findBig(cType,dest);
      if(destBig.children.some(m=>m.name===mid)){ alert(`'${dest}' 아래에 이미 '${mid}' 중분류가 있습니다. 통합을 이용하세요.`); return; }
      // move the node (with all its 소분류 children)
      destBig.children.push(midNode);
      bigNode.children=bigNode.children.filter(m=>m.name!==mid);
      // migrate tx/recur: cat big→dest for rows under this mid
      const apply=o=>{ if(o.type!==cType)return;
        if(o.cat===big && (o.sub||'')===mid) o.cat=dest;
      };
      state.tx.forEach(apply);state.recur.forEach(apply);
      // keep drill position following the moved node
      if(catNav.big===big && catNav.mid===mid){ catNav.big=dest; }
      else if(catNav.big===big){ /* stay */ }
      finishCat();return;
    }
    // lvl===2: move a 소분류 to another 중분류 (within the same type; any 대분류)
    // build list of destination 중분류 as "대분류 › 중분류", excluding current parent
    const destMids=[];
    state.cats[cType].forEach(b=>{ b.children.forEach(m=>{
      if(b.name===big && m.name===mid) return; // skip current parent
      destMids.push(`${b.name} › ${m.name}`);
    });});
    if(!destMids.length){ alert('이동할 대상 중분류가 없습니다.'); return; }
    const pick=(prompt(`'${sub}' 소분류를 어느 중분류로 옮길까요?\n"대분류 › 중분류" 형식으로 입력하세요.\n선택지: ${destMids.join(' / ')}`,destMids[0])||'').trim();
    if(!pick)return;
    if(!destMids.includes(pick)){ alert('목록에 없는 중분류입니다. "대분류 › 중분류" 형식을 확인하세요.'); return; }
    const [dBig,dMid]=pick.split(' › ');
    const destBigNode=findBig(cType,dBig), destMidNode=destBigNode&&findMid(destBigNode,dMid);
    if(!destMidNode){ alert('대상 중분류를 찾을 수 없습니다.'); return; }
    if(destMidNode.children.some(s=>s.name===sub)){ alert(`'${pick}' 아래에 이미 '${sub}' 소분류가 있습니다. 통합을 이용하세요.`); return; }
    const subNode=midNode.children.find(s=>s.name===sub);
    destMidNode.children.push(subNode);
    midNode.children=midNode.children.filter(s=>s.name!==sub);
    // migrate tx/recur: (cat,sub) → (dBig,dMid) for rows under this sub
    const apply=o=>{ if(o.type!==cType)return;
      if(o.cat===big && (o.sub||'')===mid && (o.sub2||'')===sub){ o.cat=dBig; o.sub=dMid; }
    };
    state.tx.forEach(apply);state.recur.forEach(apply);
    finishCat();return;
  }
}

/* ---------- 분류별 차트 (level × period) ---------- */
const ymd = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
function startOfWeek(d){ // week starts Monday
  const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const wd=(x.getDay()+6)%7; x.setDate(x.getDate()-wd); return x;
}
// returns {from, to (inclusive), label} for the current chartPeriod around chartRef
function periodRange(){
  const d=chartRef;
  if(chartPeriod==='day'){
    const s=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    return {from:ymd(s),to:ymd(s),label:`${s.getFullYear()}년 ${s.getMonth()+1}월 ${s.getDate()}일`};
  }
  if(chartPeriod==='week'){
    const s=startOfWeek(d); const e=new Date(s); e.setDate(s.getDate()+6);
    const wk=Math.ceil((s.getDate()+ new Date(s.getFullYear(),s.getMonth(),1).getDay())/7);
    return {from:ymd(s),to:ymd(e),label:`${s.getMonth()+1}.${s.getDate()} ~ ${e.getMonth()+1}.${e.getDate()}`};
  }
  if(chartPeriod==='year'){
    const s=new Date(d.getFullYear(),0,1), e=new Date(d.getFullYear(),11,31);
    return {from:ymd(s),to:ymd(e),label:`${d.getFullYear()}년`};
  }
  // month
  const s=new Date(d.getFullYear(),d.getMonth(),1), e=new Date(d.getFullYear(),d.getMonth()+1,0);
  return {from:ymd(s),to:ymd(e),label:`${d.getFullYear()}년 ${d.getMonth()+1}월`};
}
function shiftPeriod(dir){
  const d=new Date(chartRef);
  if(chartPeriod==='day') d.setDate(d.getDate()+dir);
  else if(chartPeriod==='week') d.setDate(d.getDate()+7*dir);
  else if(chartPeriod==='year') d.setFullYear(d.getFullYear()+dir);
  else d.setMonth(d.getMonth()+dir);
  chartRef=d; renderChart();
}

function exportExcel(){
  const typeName={income:'수입',expense:'지출',transfer:'이체',cardpay:'카드대금'};
  // 1) 거래내역 sheet
  const txRows=state.tx.slice().sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id).map(t=>{
    const isMove=t.type==='transfer'||t.type==='cardpay';
    return {
      '날짜':t.date,
      '구분':typeName[t.type]||t.type,
      '금액':t.amt,
      '대분류':isMove?'':(t.cat||''),

      '내용':t.memo||''
    };
  });
  // 2) 자산 sheet
  const asRows=state.assets.map(a=>({'자산':a.name,'잔액':assetBalance(a.id)}));
  // 3) 부채 sheet
  const liRows=(state.liabilities||[]).map(l=>({'부채':l.name,'잔액':liabBalance(l.id)}));
  // 4) 카드 sheet
  const cdRows=state.cards.map(c=>({
    '카드':c.name,'종류':isCredit(c)?'신용':'체크',
    '누적부채':isCredit(c)?(liabById(c.liabId)?.name||''):'',
    '차감/연결계좌':isCredit(c)?(c.assetId?(assetById(c.assetId)?.name||''):'연결안함'):(assetById(c.assetId)?.name||''),
    '미결제':isCredit(c)?liabBalance(c.liabId):''
  }));
  // 5) 분류체계 sheet — preserve the full 대>중>소 category tree (both 지출/수입)
  const catRows=[];
  ['expense','income'].forEach(tp=>{
    const tpName=tp==='expense'?'지출':'수입';
    (state.cats?.[tp]||[]).forEach(big=>{
      if(!big.children||!big.children.length){ catRows.push({'구분':tpName,'대분류':big.name,'중분류':'','소분류':''}); return; }
      big.children.forEach(mid=>{
        if(!mid.children||!mid.children.length){ catRows.push({'구분':tpName,'대분류':big.name,'중분류':mid.name,'소분류':''}); return; }
        mid.children.forEach(sub=>{ catRows.push({'구분':tpName,'대분류':big.name,'중분류':mid.name,'소분류':sub.name}); });
      });
    });
  });
  const wb=XLSX.utils.book_new();
  // set column widths for the tx sheet so categories read clearly
  const txWs=XLSX.utils.json_to_sheet(txRows.length?txRows:[{'날짜':'','구분':'','금액':'','대분류':'','중분류':'','소분류':'','거래처':'','출처/입금':'','내용':''}]);
  txWs['!cols']=[{wch:11},{wch:8},{wch:12},{wch:12},{wch:12},{wch:12},{wch:14},{wch:18},{wch:18}];
  XLSX.utils.book_append_sheet(wb, txWs, '거래내역');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(asRows.length?asRows:[{'자산':'','잔액':''}]), '자산');
  if(liRows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(liRows), '부채');
  if(cdRows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(cdRows), '카드');
  if(catRows.length){
    const catWs=XLSX.utils.json_to_sheet(catRows);
    catWs['!cols']=[{wch:8},{wch:14},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb, catWs, '분류체계');
  }
  const today=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `가계부_${today}.xlsx`);
}

function liabDelete(id){
  const used=state.tx.filter(t=>txLiabDelta(t,id)!==0 || t.from==='liab:'+id || t.to==='liab:'+id).length;
  const cardLinked=state.cards.filter(c=>isCredit(c)&&c.liabId===id).length;
  if(used>0){alert('이 부채에 연결된 거래가 '+used+'건 있어 삭제할 수 없습니다.');return;}
  if(cardLinked>0){alert('이 부채에 연결된 신용카드가 있습니다. 카드를 먼저 삭제하세요.');return;}
  const l=liabById(id);
  if(!confirm(`'${l.name}' 부채를 삭제할까요?`))return;
  state.liabilities=state.liabilities.filter(x=>x.id!==id);save();render();refreshAcct();
}
function assetDelete(id){
  // block if any tx touches this asset (income/expense/transfer/cardpay) or a check card links to it
  const used=state.tx.filter(t=>txAssetDelta(t,id)!==0
      || t.from==='asset:'+id || t.to==='asset:'+id).length;
  const cardLinked=state.cards.filter(c=>!isCredit(c)&&c.assetId===id).length;
  if(used>0){alert('이 자산에 연결된 거래가 '+used+'건 있어 삭제할 수 없습니다.\n해당 거래를 바꾸거나 삭제한 뒤 다시 시도하세요.');return;}
  if(cardLinked>0){alert('이 자산에 연결된 체크카드가 있습니다. 카드를 먼저 삭제하거나 다른 자산에 연결하세요.');return;}
  if(state.assets.length<=1){alert('자산은 최소 1개 있어야 합니다.');return;}
  const a=assetById(id);
  if(!confirm(`'${a.name}' 자산을 삭제할까요?`))return;
  // detach this asset from any credit card using it as the (optional) payment account
  state.cards.forEach(c=>{ if(isCredit(c)&&c.assetId===id) c.assetId=''; });
  state.assets=state.assets.filter(x=>x.id!==id);save();render();refreshAcct();
}
function cardDelete(id){
  const used=state.tx.filter(t=>t.acct===('card:'+id)||t.to===('card:'+id)).length;
  if(used>0){alert('이 카드로 기록된 거래가 '+used+'건 있어 삭제할 수 없습니다.');return;}
  const c=cardById(id);
  if(!confirm(`'${c.name}' 카드를 삭제할까요?`))return;
  state.cards=state.cards.filter(x=>x.id!==id);save();render();refreshAcct();
}

function cardEditLink(id){
  const c=cardById(id); if(!c) return;
  const list=state.assets.map((a,i)=>`${i+1}. ${a.name}`).join('\n');
  if(!isCredit(c)){
    const cur=assetById(c.assetId)?.name||'(없음)';
    const ans=(prompt(`'${c.name}' 체크카드의 차감 통장을 선택하세요 (번호 입력).\n현재: ${cur}\n\n${list}`,'')||'').trim();
    const idx=parseInt(ans)-1;
    if(isNaN(idx)||idx<0||idx>=state.assets.length){ if(ans)alert('번호가 올바르지 않습니다.'); return; }
    c.assetId=state.assets[idx].id;
  }else{
    const cur=c.assetId?(assetById(c.assetId)?.name||'(삭제된 통장)'):'연결 안 함';
    const ans=(prompt(`'${c.name}' 신용카드의 대금 출금계좌를 선택하세요.\n0 = 연결 안 함\n현재: ${cur}\n\n${list}`,'')||'').trim();
    if(ans==='') return;
    if(ans==='0'){ c.assetId=''; }
    else{
      const idx=parseInt(ans)-1;
      if(isNaN(idx)||idx<0||idx>=state.assets.length){ alert('번호가 올바르지 않습니다.'); return; }
      c.assetId=state.assets[idx].id;
    }
  }
  save();render();refreshAcct();
}

/* ---------- recurring execution ----------
   For each recur item, for the currently-viewed month:
   - key = id + '-' + mkey(cur)
   - fixed: if not logged, auto-insert a tx and mark done
   - ask: if not logged, queue a modal question (done after user answers/skips)
*/
function checkRecur(){
  const y=cur.getFullYear(), m=cur.getMonth();
  let changed=false;
  const asks=[];
  state.recur.forEach(r=>{
    const key=r.id+'-'+mkey(cur);
    if(state.recurLog[key]) return;          // already handled this month
    const day=clampDay(r.day,y,m);
    const date=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    // don't run occurrences dated before the item was registered (no back-dating
    // within the registration month). Mark them done so we don't keep asking.
    if(r.createdAt && date < r.createdAt){ state.recurLog[key]='done'; changed=true; return; }
    if(r.mode==='fixed'){
      state.tx.push({id:Date.now()+Math.random(),type:r.type,amt:r.amt,cat:r.cat,sub:r.sub||'',sub2:r.sub2||'',payee:r.payee||'',acct:r.acct||'',memo:r.memo,date,recurId:r.id});
      state.recurLog[key]='done';changed=true;
    }else{
      asks.push({r,date,key});
    }
  });
  if(changed){save();render();}
  if(asks.length) askModal(asks);
}

/* ---------- ask modal for variable recurring items ---------- */
function askModal(asks){
  const monthName=cur.getFullYear()+'년 '+(cur.getMonth()+1)+'월';
  $('modalbox').innerHTML=`
    <h3>${monthName} 반복 항목 입력</h3>
    <p class="lead">금액이 매월 달라지는 항목입니다. 이번 달 금액을 입력하세요. 비워두면 건너뜁니다.</p>
    <div id="askitems">${asks.map((a,i)=>`
      <div class="askitem">
        <div class="q">${esc(a.r.memo)} <small>· ${esc(a.r.cat)} · ${a.date} · ${a.r.type==='income'?'수입':'지출'}</small></div>
        <input type="number" inputmode="numeric" data-i="${i}" placeholder="금액 입력 (예상 ${won(a.r.amt)})" value="${a.r.amt||''}">
        <label class="toggle"><input type="checkbox" data-skip="${i}" style="width:auto"> 이번 달은 건너뛰기</label>
      </div>`).join('')}</div>
    <div class="mbtns">
      <button class="skip" id="askLater">나중에</button>
      <button class="primary" id="askSave">저장</button>
    </div>`;
  $('modal').classList.add('show');
  $('askLater').onclick=()=>$('modal').classList.remove('show'); // leaves unlogged → asks again next open
  $('askSave').onclick=()=>{
    asks.forEach((a,i)=>{
      const skip=$('askitems').querySelector(`[data-skip="${i}"]`).checked;
      const val=parseFloat($('askitems').querySelector(`[data-i="${i}"]`).value);
      if(skip){state.recurLog[a.key]='skipped';return;}
      if(val&&val>0){
        state.tx.push({id:Date.now()+Math.random(),type:a.r.type,amt:val,cat:a.r.cat,sub:a.r.sub||'',sub2:a.r.sub2||'',payee:a.r.payee||'',acct:a.r.acct||'',memo:a.r.memo,date:a.date,recurId:a.r.id});
        state.recurLog[a.key]='done';
      } // if no value and not skipped → leave unlogged, ask again later
    });
    save();$('modal').classList.remove('show');render();
  };
}

    const payeeTxt=t.payee?` <span style="font-weight:700;color:${c}">@${esc(t.payee)}</span>`:'';

// ----- helpers -----
const TAU=Math.PI*2;
function polar(cx,cy,r,a){ return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; }
// build an SVG donut chart from [{name,value,color}]; returns svg string
function donutSVG(data, size=220, thick=46){
  const total=data.reduce((s,d)=>s+d.value,0);
  const cx=size/2, cy=size/2, r=size/2-4, ri=r-thick;
  if(total<=0) return '';
  let a=-Math.PI/2; // start at top
  let paths='';
  data.forEach(d=>{
    const frac=d.value/total;
    const a2=a+frac*TAU;
    const large=frac>0.5?1:0;
    const [x1,y1]=polar(cx,cy,r,a), [x2,y2]=polar(cx,cy,r,a2);
    const [x3,y3]=polar(cx,cy,ri,a2), [x4,y4]=polar(cx,cy,ri,a);
    // full-circle guard
    if(frac>=0.9999){
      paths+=`<circle cx="${cx}" cy="${cy}" r="${(r+ri)/2}" fill="none" stroke="${d.color}" stroke-width="${thick}"/>`;
    }else{
      paths+=`<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} L${x3.toFixed(2)},${y3.toFixed(2)} A${ri},${ri} 0 ${large} 0 ${x4.toFixed(2)},${y4.toFixed(2)} Z" fill="${d.color}" stroke="#fff" stroke-width="1.5"/>`;
    }
    a=a2;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="display:block;margin:0 auto">${paths}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="12" fill="var(--muted)">합계</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="15" font-weight="800" fill="var(--ink)">${won(total)}</text></svg>`;
}
function legendHTML(data, clickable){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  return `<div class="pielegend">`+data.map((d,i)=>`
    <div class="legrow ${clickable?'legclick':''}" ${clickable?`data-name="${esc(d.rawName||d.name)}"`:''}>
      <span class="legdot" style="background:${d.color}"></span>
      <span class="legname">${esc(d.name)}</span>
      <span class="legval">${won(d.value)} · ${Math.round(d.value/total*100)}%</span>
      ${clickable&&d.canDrill?'<span class="legchev">›</span>':''}
    </div>`).join('')+`</div>`;
}

// group rows by a key function → sorted [{name,value}]
function groupRows(rows, keyFn){
  const m={};
  rows.forEach(t=>{ const k=keyFn(t); m[k]=(m[k]||0)+t.amt; });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([name,value])=>({name,value}));
}

  const keyFn = chartLevel===0 ? (t=>t.cat||'(미지정)')

    : (t=>(t.cat||'(미지정)')+' › '+(t.sub||'(중분류 없음)')+' › '+(t.sub2||'(소분류 없음)'));
  const g=groupRows(rows,keyFn);
  const lvName=['대분류','중분류','소분류'][chartLevel];
  const pdName={day:'일간',week:'주간',month:'월간',year:'연간'}[chartPeriod];
  if(!g.length){ $('chart').innerHTML=`<div class="empty">${label} 동안 ${chartType==='expense'?'지출':'수입'} 내역이 없습니다.</div>`; return; }
  const data=g.map((d,i)=>({...d,color:COLORS[i%COLORS.length]}));
  $('chart').innerHTML = donutSVG(data) + legendHTML(data,false)
    + `<div class="nums" style="margin-top:8px;color:var(--muted);font-size:12px;text-align:center">${pdName} · 전체 ${lvName} 기준 · ${data.length}개</div>`;
}

// ----- 드릴다운 view -----
function renderDrill(){
  const {from,to,label}=periodRange();
  $('clabel').textContent=label;
  const rows=state.tx.filter(t=>t.type===chartType && t.date>=from && t.date<=to);
  // breadcrumb
  let crumb='<span class="seg-c">';
  if(!chartDrill.big){ crumb+='<span class="cur">대분류</span>'; }
  else if(!chartDrill.mid){ crumb+='<a class="dcrumb" data-to="root">대분류</a><span class="sep">›</span><span class="cur">'+esc(chartDrill.big)+'</span>'; }
  else { crumb+='<a class="dcrumb" data-to="root">대분류</a><span class="sep">›</span><a class="dcrumb" data-to="big">'+esc(chartDrill.big)+'</a><span class="sep">›</span><span class="cur">'+esc(chartDrill.mid)+'</span>'; }
  crumb+='</span>';
  $('drillcrumb').innerHTML=crumb;

  let level, filtered, keyFn;
  if(!chartDrill.big){ level=0; filtered=rows; keyFn=t=>t.cat||'(미지정)'; }
  else if(!chartDrill.mid){ level=1; filtered=rows.filter(t=>(t.cat||'(미지정)')===chartDrill.big); keyFn=t=>t.sub||'(중분류 없음)'; }
  else { level=2; filtered=rows.filter(t=>(t.cat||'(미지정)')===chartDrill.big && (t.sub||'(중분류 없음)')===chartDrill.mid); keyFn=t=>t.sub2||'(소분류 없음)'; }
  const g=groupRows(filtered,keyFn);
  if(!g.length){ $('chart').innerHTML=`<div class="empty">${label} 동안 내역이 없습니다.</div>`; return; }
  // determine which slices can drill further
  const canDrillNext = level<2;
  const data=g.map((d,i)=>{
    let canDrill=false;
    if(canDrillNext && !d.name.startsWith('(')){
      // check there is deeper data under this name
      canDrill=true;
    }
    return {...d, rawName:d.name, color:COLORS[i%COLORS.length], canDrill};
  });
  $('chart').innerHTML = donutSVG(data) + legendHTML(data,true)
    + `<div class="nums" style="margin-top:8px;color:var(--muted);font-size:12px;text-align:center">${['대분류','중분류','소분류'][level]} · 조각을 누르면 하위로 이동</div>`;
}

// ----- 추세 view (line chart) -----
function buildTrendPeriods(){
  // returns array of {from,to,label} for the last `trendSpan` periods ending at chartRef
  const arr=[]; const base=new Date(chartRef);
  for(let i=trendSpan-1;i>=0;i--){
    const d=new Date(base);
    if(chartPeriod==='year') d.setFullYear(d.getFullYear()-i);
    else if(chartPeriod==='week') d.setDate(d.getDate()-7*i);
    else if(chartPeriod==='day') d.setDate(d.getDate()-i);
    else d.setMonth(d.getMonth()-i);
    const save=chartRef; chartRef=d; const r=periodRange(); chartRef=save;
    arr.push(r);
  }
  return arr;
}
function renderTrend(){
  // top categories at the chosen level over the span, each a line
  const periods=buildTrendPeriods();
  const from=periods[0].from, to=periods[periods.length-1].to;
  const allRows=state.tx.filter(t=>t.type===chartType && t.date>=from && t.date<=to);
  const keyFn = chartLevel===0 ? (t=>t.cat||'(미지정)')
    : chartLevel===1 ? (t=>(t.cat||'(미지정)')+' › '+(t.sub||'(중분류 없음)'))
    : (t=>(t.cat||'(미지정)')+' › '+(t.sub||'(중분류 없음)')+' › '+(t.sub2||'(소분류 없음)'));
  // pick top 5 categories by total
  const totals=groupRows(allRows,keyFn).slice(0,5);
  $('clabel').textContent = periods[0].label+' ~ '+periods[periods.length-1].label;
  if(!totals.length){ $('chart').innerHTML=`<div class="empty">표시할 데이터가 없습니다.</div>`; return; }
  // series: for each top category, value per period
  const series=totals.map((c,i)=>{
    const vals=periods.map(p=>{
      return state.tx.filter(t=>t.type===chartType && t.date>=p.from && t.date<=p.to && keyFn(t)===c.name)
                     .reduce((s,t)=>s+t.amt,0);
    });
    return {name:c.name, vals, color:COLORS[i%COLORS.length]};
  });
  const maxV=Math.max(1,...series.flatMap(s=>s.vals));
  // SVG line chart
  const W=Math.max(320, periods.length*46), H=200, padL=8, padR=8, padT=12, padB=28;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const x=i=> padL + (periods.length===1?plotW/2: i*plotW/(periods.length-1));
  const y=v=> padT + plotH - (v/maxV)*plotH;
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="xMidYMid meet" style="overflow:visible">`;
  // baseline
  svg+=`<line x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}" stroke="var(--rule)"/>`;
  // x labels (short)
  periods.forEach((p,i)=>{
    let lbl=p.label;
    if(chartPeriod==='month'){ const m=lbl.match(/(\d+)월/); lbl=m?m[1]+'월':lbl; }
    else if(chartPeriod==='year'){ lbl=lbl.replace('년',''); }
    else if(chartPeriod==='day'){ const m=lbl.match(/(\d+)월 (\d+)일/); lbl=m?`${m[1]}/${m[2]}`:lbl; }
    else if(chartPeriod==='week'){ lbl=lbl.split(' ~ ')[0]; }
    if(periods.length>12 && i%2===1){ /* skip alternate labels when crowded */ }
    else svg+=`<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="9" fill="var(--muted)">${esc(lbl)}</text>`;
  });
  // lines + dots
  series.forEach(s=>{
    const pts=s.vals.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
    svg+=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    s.vals.forEach((v,i)=>{ svg+=`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.6" fill="${s.color}"/>`; });
  });
  svg+=`</svg>`;
  // legend with each series total
  const legend=series.map(s=>`<div class="legrow"><span class="legdot" style="background:${s.color}"></span>
    <span class="legname">${esc(s.name)}</span><span class="legval">${won(s.vals.reduce((a,b)=>a+b,0))}</span></div>`).join('');
  const pdName={day:'일간',week:'주간',month:'월간',year:'연간'}[chartPeriod];
  const lvName=['대분류','중분류','소분류'][chartLevel];
  $('chart').innerHTML = `<div style="overflow-x:auto">${svg}</div><div class="pielegend">${legend}</div>`
    + `<div class="nums" style="margin-top:8px;color:var(--muted);font-size:12px;text-align:center">${pdName} 추세 · ${lvName} 상위 ${series.length}개 · 최근 ${trendSpan}구간</div>`;
}

      if(L===0)return o.cat===big;

      ${L>0?`<button class="catbtn" data-act="move" data-lvl="${L}" data-big="${esc(big)}" data-mid="${esc(mid)}" data-sub="${esc(sub)}">이동</button>`:''}

    crumb+=`<a class="crumbnav" data-to="root">${labelName}</a>`;
    crumb+=`<span class="sep">›</span>`;
    if(lvl===1){ crumb+=`<span class="cur">${esc(catNav.big)}</span>`; }

      crumb+=`<a class="crumbnav" data-to="big">${esc(catNav.big)}</a>`;
      crumb+=`<span class="sep">›</span><span class="cur">${esc(catNav.mid)}</span>`;

  crumb+=`</span>`;
  $('catcrumb').innerHTML=crumb;

  // list of items at current level
  let items, emptyMsg, addPh;
  if(lvl===0){
    items=state.cats[tType].map(b=>({name:b.name,kids:b.children.length,L:0,big:b.name,mid:'',sub:''}));
    emptyMsg='대분류가 없습니다. 아래에서 추가하세요.';
    addPh='새 대분류 이름';

    const big=findBig(tType,catNav.big);
    items=(big?big.children:[]).map(m=>({name:m.name,kids:m.children.length,L:1,big:catNav.big,mid:m.name,sub:''}));
    emptyMsg=`'${esc(catNav.big)}' 아래에 중분류가 없습니다. 추가하거나, 이 대분류는 중분류 없이 바로 사용해도 됩니다.`;
    addPh='새 중분류 이름';
  }else{
    const big=findBig(tType,catNav.big), mid=big&&findMid(big,catNav.mid);
    items=(mid?mid.children:[]).map(s=>({name:s.name,kids:0,L:2,big:catNav.big,mid:catNav.mid,sub:s.name}));
    emptyMsg=`'${esc(catNav.mid)}' 아래에 소분류가 없습니다. 추가하거나, 이 중분류는 소분류 없이 바로 사용해도 됩니다.`;
    addPh='새 소분류 이름';
  }

  $('catlist').innerHTML=items.length? items.map(it=>{
    const canDrill = it.L<2; // 대/중분류는 하위로 들어갈 수 있음
    const chev = canDrill? '<span class="chev">›</span>' : '<span class="chev hide">›</span>';

    const navCls = canDrill? 'nav' : 'nav leaf';
    const drillAttr = canDrill? `data-drill="1" data-name="${esc(it.name)}"` : '';
    return `<div class="crow2">
      <button class="${navCls}" ${drillAttr}>${chev}<span class="nm">${esc(it.name)}</span></button>
      ${kidInfo}
      ${actBtns(it.L,it.big,it.mid,it.sub)}
    </div>`;
  }).join('') : `<div class="empty">${emptyMsg}</div>`;

  $('newCat').placeholder=addPh;
}

/* ---------- Google Drive sync (via File System Access API) ----------
   How it works:
   - You pick (or create) a file named 가계부_데이터.json INSIDE your Google Drive
     desktop sync folder. The browser keeps a handle to that exact file.
   - After that, every change auto-saves to that file (debounced). Google Drive
     desktop then syncs it to the cloud automatically.
   - The handle is stored in IndexedDB so it survives page reloads. On reload the
     browser asks once for permission, then auto-save resumes.
   - Browsers without this API (Safari, most mobile) fall back to manual
     download / upload using the same filename.
*/
const DRIVE_FILENAME='가계부_데이터.json';
const FS_SUPPORTED = 'showSaveFilePicker' in window;
let driveHandle=null, driveDirty=false, driveSaving=false, saveTimer=null;

/* tiny IndexedDB helper to persist the file handle */
const idb={
  db:null,
  open(){return new Promise((res,rej)=>{const r=indexedDB.open('budgetSync',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('h');
    r.onsuccess=()=>{this.db=r.result;res();};r.onerror=()=>rej(r.error);});},
  async set(k,v){await this.open();return new Promise((res,rej)=>{const t=this.db.transaction('h','readwrite');t.objectStore('h').put(v,k);t.oncomplete=res;t.onerror=()=>rej(t.error);});},
  async get(k){await this.open();return new Promise((res,rej)=>{const t=this.db.transaction('h','readonly');const q=t.objectStore('h').get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});},
  async del(k){await this.open();return new Promise((res,rej)=>{const t=this.db.transaction('h','readwrite');t.objectStore('h').delete(k);t.oncomplete=res;t.onerror=()=>rej(t.error);});}
};

async function verifyPermission(handle){
  const opts={mode:'readwrite'};
  if(await handle.queryPermission(opts)==='granted')return true;
  if(await handle.requestPermission(opts)==='granted')return true;
  return false;
}

async function writeToDrive(){
  if(!driveHandle)return;
  driveSaving=true;updateSyncUI();
  try{
    const w=await driveHandle.createWritable();
    await w.write(JSON.stringify(state,null,2));
    await w.close();
    driveDirty=false;
  }catch(e){
    console.error(e);
    setSyncMsg('드라이브 저장 실패 — 다시 시도하세요',true);
  }
  driveSaving=false;updateSyncUI();
}

function scheduleDriveSave(){
  if(!driveHandle)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(writeToDrive,1200); // debounce 1.2s
}

/* link / create the file */
$('linkDrive').onclick=async()=>{
  if(!FS_SUPPORTED){
    alert('이 브라우저는 자동 저장(파일 연결)을 지원하지 않습니다.\n크롬·엣지 등 데스크톱 브라우저에서 사용하시거나, 아래 "파일로 내보내기"를 이용하세요.\n\n파일명을 '+DRIVE_FILENAME+' 으로 저장한 뒤 구글 드라이브 동기화 폴더에 두면 됩니다.');
    return;
  }
  try{
    const handle=await window.showSaveFilePicker({
      suggestedName:DRIVE_FILENAME,
      types:[{description:'가계부 데이터',accept:{'application/json':['.json']}}]
    });
    driveHandle=handle;
    await idb.set('handle',handle);
    await writeToDrive();           // write current data immediately
    updateSyncUI();
    setSyncMsg('드라이브 파일에 연결됨 — 이제 자동 저장됩니다');
  }catch(e){ if(e.name!=='AbortError') console.error(e); }
};

$('saveDrive').onclick=()=>writeToDrive();

$('unlinkDrive').onclick=async()=>{
  if(!confirm('드라이브 파일 연결을 해제할까요?\n(데이터는 브라우저에 그대로 남습니다)'))return;
  driveHandle=null;await idb.del('handle');updateSyncUI();
  setSyncMsg('연결 해제됨 — 브라우저에만 저장됩니다');
};

/* restore handle on load */
async function restoreDrive(){
  if(!FS_SUPPORTED){renderSyncHelp();updateSyncUI();return;}
  try{
    const handle=await idb.get('handle');
    if(handle){
      if(await verifyPermission(handle)){
        driveHandle=handle;
        // pull the file's content if it's newer/has data, else push ours
        try{
          const f=await handle.getFile();
          const txt=await f.text();
          if(txt.trim()){
            const d=JSON.parse(txt);
            if(confirm('연결된 드라이브 파일에서 데이터를 불러올까요?\n\n[확인] 드라이브 파일 사용 (이 브라우저 데이터 덮어씀)\n[취소] 브라우저 데이터 유지 (드라이브 파일 덮어씀)')){
              state=Object.assign(load(),d);ensureShape();save_local();catNav={big:null,mid:null};fillCats();fillRCats();render();checkRecur();
            }else{ await writeToDrive(); }
          }
        }catch(e){console.error(e);}
      }
    }
  }catch(e){console.error(e);}
  renderSyncHelp();updateSyncUI();
}

function ensureShape(){
  if(!state.recur)state.recur=[];if(!state.recurLog)state.recurLog={};
  if(!state.budgets)state.budgets={};if(!state.tx)state.tx=[];
  if(!state.assets)state.assets=[{id:'a_cash',name:'현금',opening:0},{id:'a_bank',name:'통장',opening:0}];
  if(!state.liabilities)state.liabilities=[];
  if(!state.cards)state.cards=[];
  state.cards.forEach(c=>{ if(!c.kind){c.kind='check'; if(!('liabId'in c))c.liabId='';} });
  state=migrateCats(state); // normalize categories to 대/중/소 tree
}
function save_local(){ localStorage.setItem('budgetData',JSON.stringify(state)); }

/* ---------- sync UI ---------- */
function setSyncMsg(msg,warn){ $('syncmsg').textContent=msg; if(warn) $('syncdot').className='syncdot dirty'; }
function updateSyncUI(){
  const dot=$('syncdot'), msg=$('syncmsg');
  $('linkDrive').style.display = driveHandle? 'none':'';
  $('saveDrive').style.display = driveHandle? '':'none';
  $('unlinkDrive').style.display = driveHandle? '':'none';
  if(driveHandle){

    else{dot.className='syncdot linked';msg.textContent='드라이브에 저장됨';}
  }else{
    dot.className='syncdot';msg.textContent='브라우저에 자동 저장됨';
  }
}
function renderSyncHelp(){
  if(FS_SUPPORTED){
    $('syncHelp').innerHTML='"드라이브 파일 연결"을 누르고 <b>구글 드라이브 동기화 폴더 안</b>에 '+DRIVE_FILENAME+' 으로 저장하세요. 이후 모든 변경이 그 파일에 자동 저장되고, 드라이브가 클라우드로 동기화합니다.';
  }else{
    $('syncHelp').textContent='이 브라우저는 파일 자동 연결을 지원하지 않습니다. "파일로 내보내기"로 저장한 파일을 구글 드라이브 동기화 폴더에 두세요.';
  }
}

/* ---------- manual export / import (fallback & backup) ---------- */
$('export').onclick=()=>{const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=DRIVE_FILENAME;a.click();};
$('import').onclick=()=>$('file').click();
$('file').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);state=Object.assign(load(),d);ensureShape();
    save();catNav={big:null,mid:null};fillCats();fillRCats();render();checkRecur();alert('불러오기 완료');}catch(x){alert('파일을 읽을 수 없습니다.');}};
  r.readAsText(f);};

/* save before leaving if there are unsaved drive changes */
window.addEventListener('beforeunload',e=>{ if(driveHandle&&driveDirty){ writeToDrive(); } });

/* ---------- init ---------- */
$('date').value=new Date().toISOString().slice(0,10);
fillCats();
fillRCats();
refreshPayeeList();
applyType();
refreshCardLinkSelect();
render();
checkRecur();
restoreDrive();

/* ---------- PWA: register service worker ---------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{ /* offline mode unavailable; app still works */ });
  });
}
</script>
</body>
</html>
